# ============================================================
# OpenClaw Skill File
# Skill: Payslip Analyzer
# Version: 1.0.0
# Author: Malaysian Fresh Graduate Financial Assistant
# ============================================================

skill:
  name: "Payslip Analyzer"
  id: payslip_analyzer_my
  version: "1.0.0"
  description: >
    Analyzes Malaysian payslip images using computer vision and OCR.
    Extracts salary components, validates statutory deductions (EPF, SOCSO,
    PCB, EIS) against official Malaysian rates, estimates DSR loan eligibility,
    and generates visual breakdowns. Designed for Malaysian fresh graduates
    and employees who want to understand their payslip and verify deduction
    accuracy without consulting HR.

  target_user:
    audience: "Malaysian fresh graduates and employees"
    language: "English (with Bahasa Malaysia field labels recognized)"
    domain: "Personal Finance / HR Payroll"
    pain_points:
      - "Cannot interpret payslip deduction line items"
      - "Unsure if EPF, SOCSO, and PCB amounts are correctly deducted"
      - "No quick way to estimate bank loan eligibility from current net pay"
      - "Lack of visual summary of where salary goes each month"

  real_world_problem: >
    Many Malaysian fresh graduates receive their first payslip without
    understanding what EPF, SOCSO, PCB, or EIS mean, and whether the
    amounts deducted are correct. Overpayment or underpayment of statutory
    contributions can go unnoticed for months. Additionally, employees
    planning to take a personal loan or mortgage have no simple tool to
    estimate their maximum eligible loan amount based on Debt Service Ratio
    (DSR) rules used by Malaysian banks.

# ============================================================
# INPUT SPECIFICATION
# ============================================================

input:
  type: image
  accepted_formats:
    - image/jpeg
    - image/png
  max_file_size_mb: 10
  min_resolution_px: 400
  description: >
    A photograph or scanned image of a Malaysian payslip. The payslip must
    show at minimum: gross salary, at least one deduction field, and net pay.
    Both private company and government payslip formats are supported.
  example_fields_expected:
    - "Employer / Company Name"
    - "Employee Name (optional)"
    - "Gross Salary / Gaji Kasar"
    - "Basic Salary / Gaji Pokok"
    - "Allowances / Elaun"
    - "EPF / KWSP (Employee Contribution)"
    - "SOCSO / PERKESO"
    - "PCB / MTD (Tax Deduction)"
    - "EIS / SIP"
    - "Net Pay / Gaji Bersih"

# ============================================================
# OUTPUT SPECIFICATION
# ============================================================

output:
  - id: text_summary
    type: text
    format: plain_english
    description: >
      Structured plain-English report showing all extracted fields,
      validation results per deduction, net pay, and max loan estimate.
    includes:
      - employer_name
      - gross_salary
      - allowances_total
      - deductions_table_with_status
      - net_pay
      - loan_eligibility_estimate
      - disclaimer

  - id: pie_chart
    type: image
    format: PNG
    filename: salary_chart.png
    description: >
      Matplotlib pie chart showing the salary breakdown: Basic Pay,
      Allowances, EPF, SOCSO, PCB, EIS, and Remainder (Net).

  - id: bar_chart
    type: image
    format: PNG
    filename: loan_chart.png
    description: >
      Matplotlib bar chart comparing net pay against the estimated
      maximum monthly loan repayment (DSR 60%) and the 50/30/20
      recommended savings target.

  - id: employer_cost_chart
    type: image
    format: PNG
    filename: employer_cost_chart.png
    description: >
      Matplotlib pie chart showing the total cost to the employer:
      net pay, all employee deductions, and all employer contributions
      (EPF 13%, SOCSO employer share, EIS 0.2%).

# ============================================================
# CV PIPELINE
# ============================================================

pipeline:

  - step: 1
    name: "Image Preprocessing"
    module: cv_preprocessing
    description: "Prepare the payslip image for reliable OCR."
    operations:
      - operation: grayscale_conversion
        method: "cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)"
        reason: "Removes color noise; payslip text is monochrome."

      - operation: contrast_enhancement
        method: "CLAHE (Contrast Limited Adaptive Histogram Equalization)"
        params:
          clip_limit: 2.0
          tile_grid_size: [8, 8]
        reason: "Improves legibility on low-contrast or faded printouts."

      - operation: deskew_correction
        method: "Hough Line Transform to detect skew angle, then warpAffine"
        threshold_degrees: 0.5
        reason: "Corrects camera-angle tilt to improve OCR bounding box accuracy."

      - operation: blur_detection
        method: "Laplacian variance"
        blur_threshold: 100
        on_fail: "Print soft warning and continue pipeline"
        reason: >
          Low sharpness triggers a warning message but does NOT stop processing.
          Most phone photos still produce usable OCR results despite low scores.
          Only genuinely unreadable images (score near 0) will fail at OCR stage.

      - operation: binarization
        method: "Otsu thresholding after Gaussian blur"
        reason: "Produces clean black-and-white image for Tesseract OCR."

  - step: 2
    name: "Layout Segmentation"
    module: layout_segmentation
    description: "Divide the preprocessed image into logical payslip regions."
    regions:
      - id: header_region
        description: "Top portion — employer name, employee name, pay period"
        detection: "Top 20% of image or text above first horizontal rule"

      - id: earnings_region
        description: "Earnings table — basic salary, allowances, gross"
        detection: "Block containing keywords: Gaji Pokok, Elaun, Gross, Earnings"

      - id: deductions_region
        description: "Deductions table — EPF, SOCSO, PCB, EIS"
        detection: "Block containing keywords: Potongan, Deduction, KWSP, PERKESO, PCB, EIS"

      - id: net_pay_region
        description: "Bottom summary — net pay / Gaji Bersih"
        detection: "Last bold/large numeric value near keywords: Net Pay, Bersih, Jumlah Bersih"

  - step: 3
    name: "OCR Field Extraction"
    module: ocr_extraction
    description: "Run Tesseract OCR per region and map text to structured fields."
    engine: "Tesseract v5 (tesseract-ocr)"
    language_packs:
      - eng
      - msa
    psm_mode: 11   # sparse text — treats each word independently; required for
                   # two-column and side-by-side payslip layouts (PSM 6 merges
                   # columns into garbled lines)
    post_processing:
      - "Strip non-numeric characters from currency fields (keep digits and decimal point)"
      - "Normalize RM / MYR prefix"
      - "Map bilingual labels (KWSP → EPF, MTD → PCB, SIP → EIS)"
    fields_extracted:
      - field: employer_name
        region: header_region
        type: string
        fallback: "not detected"

      - field: gross_salary
        region: earnings_region
        type: float
        keywords: ["Gross", "Gaji Kasar", "Jumlah Pendapatan"]
        fallback: "not detected"

      - field: basic_salary
        region: earnings_region
        type: float
        keywords: ["Basic", "Gaji Pokok"]
        fallback: "not detected"

      - field: allowances_total
        region: earnings_region
        type: float
        keywords: ["Allowance", "Elaun", "Tambahan"]
        fallback: "not detected"

      - field: epf_amount
        region: deductions_region
        type: float
        keywords: ["EPF", "KWSP"]
        fallback: "not detected"

      - field: socso_amount
        region: deductions_region
        type: float
        keywords: ["SOCSO", "PERKESO"]
        fallback: "not detected"

      - field: pcb_amount
        region: deductions_region
        type: float
        keywords: ["PCB", "MTD", "Cukai Pendapatan"]
        fallback: "not detected"

      - field: eis_amount
        region: deductions_region
        type: float
        keywords: ["EIS", "SIP"]
        fallback: "not detected"

      - field: net_pay
        region: net_pay_region
        type: float
        keywords: ["Net Pay", "Gaji Bersih", "Jumlah Bersih", "Bawa Balik"]
        fallback: "not detected"

  - step: 4
    name: "Statutory Validation"
    module: statutory_validation
    description: >
      Cross-check extracted deduction amounts against official Malaysian
      statutory rates. Flag discrepancies as WARNING; confirm matches as OK.
    validations:

      - id: epf_validation
        field: epf_amount
        rule: "EPF employee contribution = 11% of gross salary (for employees below age 60)"
        reference: "Employees Provident Fund Act 1991 — Third Schedule"
        method: |
          expected_epf = round(gross_salary * 0.11, 2)
          tolerance = 1.00  # RM 1 tolerance for rounding differences
          if abs(epf_amount - expected_epf) <= tolerance:
            status = "CORRECT"
          else:
            status = "WARNING — Expected RM {expected_epf}, found RM {epf_amount}"
        on_field_missing: "unable to verify"

      - id: socso_validation
        field: socso_amount
        rule: >
          SOCSO (Employment Injury + Invalidity Pension, 1st & 2nd Category)
          based on 6-band salary table. Employee ~1%, employer ~1.75%.
          Not applicable when gross salary exceeds RM 4,000.
        reference: "Employees' Social Security Act 1969 — Second Schedule (2022 amendment)"
        salary_bands:
          # Format: [ceiling_inclusive, employee_contribution, employer_contribution]
          - [1500,  14.75,  26.10]
          - [2000,  19.75,  34.85]
          - [2500,  24.75,  43.60]
          - [3000,  29.75,  52.35]
          - [3500,  34.75,  61.10]
          - [4000,  39.75,  69.85]
        note: >
          Gross salary capped at RM 4,000 for SOCSO purposes.
          Gross > RM 4,000 → SOCSO not applicable (not deducted).
          Maximum employee contribution: RM 39.75 (band ≤ RM 4,000).
          Maximum employer contribution: RM 69.85 (band ≤ RM 4,000).
        on_field_missing: "unable to verify"

      - id: pcb_validation
        field: pcb_amount
        rule: >
          PCB (Monthly Tax Deduction) is estimated from LHDN's PCB schedule
          based on gross taxable income, marital status, and number of children.
          Exact PCB requires personal relief details not visible on payslip.
        reference: "Income Tax Act 1967 — LHDN PCB Deduction Schedule"
        method: |
          # Rough bracket estimate for single, no dependants (conservative)
          annual_estimate = gross_salary * 12
          if annual_estimate <= 5000:
            expected_pcb = 0
          elif annual_estimate <= 20000:
            expected_pcb = round(((annual_estimate - 5000) * 0.01) / 12, 2)
          elif annual_estimate <= 35000:
            expected_pcb = round(((150 + (annual_income - 20000) * 0.03)) / 12, 2)
          elif annual_estimate <= 50000:
            expected_pcb = round(((600 + (annual_income - 35000) * 0.08)) / 12, 2)
          elif annual_estimate <= 70000:
            expected_pcb = round(((1800 + (annual_income - 50000) * 0.13)) / 12, 2)
          elif annual_estimate <= 100000:
            expected_pcb = round(((4400 + (annual_income - 70000) * 0.21)) / 12, 2)
          else:
            expected_pcb = round(((10700 + (annual_income - 100000) * 0.24)) / 12, 2)
          # Accept if within 20% range (personal reliefs unknown)
          lower = expected_pcb * 0.80
          upper = expected_pcb * 1.20
          if lower <= pcb_amount <= upper:
            status = "CORRECT (estimated)"
          else:
            status = "WARNING — Estimated PCB RM {expected_pcb}/month; actual may differ with reliefs"
        disclaimer: "PCB validation is an estimate only. Exact PCB depends on personal reliefs."
        on_field_missing: "unable to verify"

      - id: eis_validation
        field: eis_amount
        rule: >
          EIS (Employment Insurance System) employee contribution = 0.2% of
          insured salary, capped at RM 4,000/month.
        reference: "Employment Insurance System Act 2017"
        method: |
          insured_salary = min(gross_salary, 4000)
          expected_eis = round(insured_salary * 0.002, 2)
          tolerance = 0.10
          if abs(eis_amount - expected_eis) <= tolerance:
            status = "CORRECT"
          else:
            status = "WARNING — Expected RM {expected_eis}, found RM {eis_amount}"
        on_field_missing: "unable to verify"

      - id: net_pay_crosscheck
        description: "Verify net pay = gross salary - sum of all detected deductions"
        method: |
          total_deductions = epf + socso + pcb + eis + any_other_deductions
          calculated_net = gross_salary - total_deductions
          if abs(calculated_net - net_pay) <= 1.00:
            status = "Net pay cross-check PASSED"
          else:
            status = "WARNING — Computed net RM {calculated_net} differs from stated RM {net_pay}"

  - step: 5
    name: "Financial Calculations"
    module: financial_calculations
    description: "Compute loan eligibility and savings targets from net pay."
    calculations:

      - id: dsr_loan_eligibility
        formula: "max_monthly_repayment = net_pay * 0.60"
        description: >
          Malaysian banks typically use a Debt Service Ratio (DSR) of up to 60%
          for fresh graduates. This means total monthly loan repayments must not
          exceed 60% of net take-home pay.
        note: "DSR thresholds vary by bank and total income. This is an estimate."

      - id: savings_gap_analysis
        formula:
          needs: "net_pay * 0.50"
          wants: "net_pay * 0.30"
          savings: "net_pay * 0.20"
        description: >
          Applies the 50/30/20 budgeting rule:
          50% for needs (rent, utilities, groceries),
          30% for wants (lifestyle, entertainment),
          20% for savings and debt repayment.
        reference: "Popularised by Sen. Elizabeth Warren; widely adopted in Malaysian personal finance education"

  - step: 6
    name: "Chart Generation"
    module: chart_generation
    description: "Generate visual charts using matplotlib."
    charts:

      - id: salary_breakdown_pie
        type: pie
        library: matplotlib
        title: "Monthly Salary Breakdown"
        segments:
          - label: "Basic Salary"
            value_field: basic_salary
            color: "#2196F3"
          - label: "Allowances"
            value_field: allowances_total
            color: "#4CAF50"
          - label: "EPF Deduction"
            value_field: epf_amount
            color: "#FF5722"
          - label: "SOCSO Deduction"
            value_field: socso_amount
            color: "#FF9800"
          - label: "PCB (Tax)"
            value_field: pcb_amount
            color: "#9C27B0"
          - label: "EIS Deduction"
            value_field: eis_amount
            color: "#795548"
        output_file: "salary_breakdown.png"
        format: PNG
        dpi: 150

      - id: loan_eligibility_bar
        type: bar
        library: matplotlib
        title: "Net Pay vs Loan Eligibility (DSR 60%)"
        bars:
          - label: "Net Monthly Pay"
            value_field: net_pay
            color: "#2196F3"
          - label: "Max Monthly Repayment (DSR 60%)"
            value_field: max_monthly_repayment
            color: "#4CAF50"
          - label: "Recommended Savings (20%)"
            value_field: savings_target
            color: "#FF9800"
        ylabel: "Amount (RM)"
        output_file: "loan_eligibility.png"
        format: PNG
        dpi: 150

  - step: 7
    name: "Output Report Assembly"
    module: report_assembly
    description: "Assemble the text summary, validation results, and chart paths."
    report_template: |
      ============================================================
      PAYSLIP ANALYSIS REPORT
      Analyzed by: OpenClaw Payslip Analyzer v1.0.0
      ============================================================

      EMPLOYER        : {employer_name}
      ────────────────────────────────────────────────────────────
      EARNINGS
        Basic Salary  : RM {basic_salary}
        Allowances    : RM {allowances_total}
        GROSS SALARY  : RM {gross_salary}

      ────────────────────────────────────────────────────────────
      DEDUCTIONS
        EPF (11%)     : RM {epf_amount}       [{epf_status}]
        SOCSO         : RM {socso_amount}     [{socso_status}]
        PCB / Tax     : RM {pcb_amount}       [{pcb_status}]
        EIS (0.2%)    : RM {eis_amount}       [{eis_status}]
      ────────────────────────────────────────────────────────────
      NET PAY         : RM {net_pay}          [{net_crosscheck_status}]

      ────────────────────────────────────────────────────────────
      FINANCIAL INSIGHTS
        Max Monthly Loan Repayment (DSR 60%) : RM {max_monthly_repayment}
        Recommended Monthly Savings (20%)   : RM {savings_target}
        Needs Budget (50%)                  : RM {needs_budget}
        Wants Budget (30%)                  : RM {wants_budget}

      ────────────────────────────────────────────────────────────
      VALIDATION LEGEND
        CORRECT        — Amount matches statutory rate
        WARNING        — Amount differs from expected; verify with HR
        unable to verify — Field could not be extracted from image
        CORRECT (est.) — Within expected range; exact value needs personal reliefs

      ============================================================
      DISCLAIMER: This analysis is an estimate based on publicly
      available Malaysian statutory rates. Results do not constitute
      tax or financial advice. Please verify with your HR department
      or a licensed financial advisor. EPF, SOCSO, PCB, and EIS
      figures are governed by Malaysian law and may change annually.
      This tool does not store or transmit your payslip image.
      ============================================================

# ============================================================
# LIMITATION HANDLING
# ============================================================

limitations:
  - condition: "Image blur score (Laplacian variance) < 100"
    response_code: WARN_BLURRY_IMAGE
    user_message: >
      Note: low sharpness detected — if results look wrong, retake the
      photo in brighter lighting with the payslip lying flat.
    action: warn_and_continue   # soft warning; pipeline continues

  - condition: "Any OCR field cannot be extracted"
    response_code: FIELD_NOT_DETECTED
    field_value: "not detected"
    action: continue_pipeline
    user_message: >
      One or more fields could not be read from your payslip.
      This may be due to unusual formatting or low image quality
      for that region. Those fields are marked as 'not detected'.

  - condition: "Validation cannot be performed (field missing or formula error)"
    response_code: UNABLE_TO_VERIFY
    validation_status: "unable to verify"
    action: continue_pipeline
    user_message: >
      Some deductions could not be validated because the required
      field values were not detected. Affected items are marked
      'unable to verify'.

  - condition: "Gross salary not detected"
    response_code: CRITICAL_FIELD_MISSING
    action: halt_pipeline
    user_message: >
      Gross salary could not be detected from your payslip.
      This value is required for all calculations. Please check
      that the earnings section is clearly visible in the photo.

  - condition: "Image resolution below 400px on shortest side"
    response_code: WARN_LOW_RESOLUTION
    action: halt_pipeline
    user_message: >
      Image resolution is too low for reliable text extraction.
      Please provide a higher-quality scan or photo (minimum
      400px on the shorter side).

# ============================================================
# ETHICAL BOUNDARIES
# ============================================================

ethics:
  data_retention:
    rule: "Do not store or cache the payslip image after processing completes."
    implementation: "Delete temp image files from disk immediately after OCR step."

  data_sharing:
    rule: "Do not transmit payslip image or extracted personal data to any third party."
    implementation: "All processing is local; no external API calls for image data."

  output_disclaimer:
    mandatory: true
    text: >
      Results are estimates based on publicly available Malaysian statutory rates.
      Verify all figures with your HR department or a licensed financial advisor.

  tax_advice_boundary:
    rule: "Do not provide tax filing advice, suggest tax strategies, or recommend tax reliefs."
    allowed: "Validate that PCB deduction is within expected range."
    not_allowed: "Advise on how to reduce PCB via additional reliefs or investments."

  development_data:
    rule: "Only use dummy or synthetically generated fake payslip data during development and testing."
    not_allowed: "Use real employee payslip images for testing, debugging, or demonstration."

  privacy_notice:
    display_on_startup: true
    text: >
      This tool processes your payslip image locally. No image or personal
      data is stored or shared. Results are estimates only.

# ============================================================
# DEPENDENCIES
# ============================================================

dependencies:
  python: ">=3.9"
  packages:
    - name: opencv-python
      version: ">=4.8.0"
      purpose: "Image preprocessing (grayscale, CLAHE, deskew, blur detection)"
    - name: pytesseract
      version: ">=0.3.10"
      purpose: "OCR text extraction"
    - name: Pillow
      version: ">=10.0.0"
      purpose: "Image loading and format conversion"
    - name: numpy
      version: ">=1.24.0"
      purpose: "Array operations for image processing"
    - name: matplotlib
      version: ">=3.7.0"
      purpose: "Pie chart and bar chart generation"
    - name: imutils
      version: ">=0.5.4"
      purpose: "Deskew and image utility helpers"
  system:
    - name: tesseract-ocr
      version: ">=5.0"
      install_hint: "https://github.com/UB-Mannheim/tesseract/wiki (Windows)"
      language_packs_required:
        - eng
        - msa

# ============================================================
# TESTING
# ============================================================

testing:
  policy: "Use only fake/dummy payslip data during development."
  test_cases:
    - id: TC01
      description: "Fresh graduate, single, no allowances, standard two-column layout"
      image: payslip_tc01.png
      expected_epf: 275.00
      expected_socso: 12.75
      expected_eis: 5.00
      status: PASS

    - id: TC02
      description: "Mid-level, salary RM 5000, transport allowance RM 300"
      image: payslip_tc02.png
      expected_epf: 550.00
      expected_socso: 24.75
      expected_eis: 8.00
      status: PASS

    - id: TC03
      description: "Payslip with low-contrast WARNING watermark"
      image: payslip_tc03_warning.png
      status: PASS

    - id: TC04
      description: "Blurry image — soft warning, pipeline continues"
      image: payslip_tc04_blurry.png
      expected_response_code: WARN_BLURRY_IMAGE
      action: warn_and_continue
      status: PASS

    - id: TC05
      description: "Real phone photo — background removal + PSM 11 required"
      image: payslip_tc05_real.png
      notes: "Decimal comma artifact fixed; PSM 11 sparse-text OCR pass added"
      status: PASS

    - id: TC06
      description: "OT + night shift + daily attendance allowances"
      image: payslip_tc06.png
      notes: "allowance_line_re expanded; math-consistency fallback added"
      status: PASS

    - id: TC07
      description: "Three-column BM-first teal layout (Gaji Pokok / KWSP / PERKESO)"
      image: payslip_tc07.png
      gross: 3500.00
      expected_epf: 385.00
      expected_socso: 34.75
      expected_eis: 7.00
      expected_net: 3013.25
      status: PASS

    - id: TC08
      description: "Left/right two-column side-by-side layout"
      image: payslip_tc08.png
      gross: 2900.00
      expected_epf: 319.00
      expected_socso: 29.75
      expected_eis: 5.80
      expected_net: 2515.45
      notes: "Gross<basic sanity check + white row backgrounds prevent OCR noise"
      status: PASS

  quality_checks:
    - "All 8 test cases return status_code OK"
    - "EPF validation matches within RM 1.00 tolerance"
    - "SOCSO validation matches correct 6-band salary band"
    - "EIS validation matches within RM 0.10 tolerance"
    - "Three charts render without errors and are saved as PNG"
    - "Disclaimer text present in every output report"
    - "analyze_payslip_tool.py smoke-test passes for TC07 and TC08"

# ============================================================
# OPENCLAW INTEGRATION
# ============================================================

openclaw:

  # ── Tool registration ─────────────────────────────────────────────────
  tool_file:    "analyze_payslip_tool.py"   # place in same dir as payslip_analyzer.py
  tool_name:    "analyze_payslip"
  handler:      "run_tool"                  # function OpenClaw calls
  timeout_seconds: 60

  # ── How to register the tool in your OpenClaw app ────────────────────
  registration_snippet: |
    from analyze_payslip_tool import register
    import openclaw

    app = openclaw.App()
    register(app)   # registers the analyze_payslip tool
    app.run()

  # ── Direct import (without OpenClaw framework) ────────────────────────
  direct_invoke_example: |
    from analyze_payslip_tool import run_tool

    result = run_tool(image_path="payslip_sample.jpg", output_dir="output")

    if result["status_code"] == "OK":
        print(result["text_summary"])
        # result["salary_chart_path"]        → "output/salary_chart.png"
        # result["loan_chart_path"]          → "output/loan_chart.png"
        # result["employer_cost_chart_path"] → "output/employer_cost_chart.png"
    else:
        print(result["error_message"])

  # ── Trigger — when should OpenClaw invoke this skill? ─────────────────
  trigger:
    when:
      - user_sends: image
        and_message_contains_any:
          - "payslip"
          - "salary slip"
          - "gaji"
          - "penyata gaji"
          - "epf"
          - "kwsp"
          - "analyze"
          - "check my pay"
      - user_sends: image
        and_no_other_skill_matched: true   # fallback: analyze any image if no other skill fits

  # ── Response — what to send back to the user ─────────────────────────
  response:
    on_success:
      - type: text
        content: "{{ result.text_summary }}"
      - type: image
        path:    "{{ result.salary_chart_path }}"
        caption: "Salary breakdown"
        send_if: "{{ result.salary_chart_path is not none }}"
      - type: image
        path:    "{{ result.loan_chart_path }}"
        caption: "Loan eligibility (DSR 60%)"
        send_if: "{{ result.loan_chart_path is not none }}"
      - type: image
        path:    "{{ result.employer_cost_chart_path }}"
        caption: "Total cost to employer"
        send_if: "{{ result.employer_cost_chart_path is not none }}"

    on_error:
      ERROR_FILE_NOT_FOUND: "Could not read image, please try again."
      ERROR_NO_TEXT:        "No text detected, please send a clearer image."
      ERROR_PIPELINE:       "Something went wrong while processing your payslip. Please try again."

  # ── Return value schema ───────────────────────────────────────────────
  returns:
    status_code:              "OK | ERROR_FILE_NOT_FOUND | ERROR_NO_TEXT | ERROR_PIPELINE"
    text_summary:             "str — full analysis report"
    salary_chart_path:        "str — absolute path to salary_chart.png"
    loan_chart_path:          "str — absolute path to loan_chart.png"
    employer_cost_chart_path: "str — absolute path to employer_cost_chart.png"
    error_message:            "str | null"
    fields:                   "dict | null — raw extracted field values"
